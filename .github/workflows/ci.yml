name: CI

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    # ── Service containers ─────────────────────────────────────────────────
    # 使用單一 PostgreSQL 容器，在啟動後建立全部 5 個 DB。
    # 這樣所有連線都用 localhost:5432，不需要 per-shard port 設定。
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_pass
          POSTGRES_DB: small_bank_meta
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user -d small_bank_meta"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    # ── Environment variables ──────────────────────────────────────────────
    env:
      NODE_ENV: test

      PG_USER: ci_user
      PG_PASSWORD: ci_pass
      PG_PORT: "5432"

      PG_META_HOST: localhost
      PG_SHARD_0_HOST: localhost
      PG_SHARD_1_HOST: localhost
      PG_SHARD_2_HOST: localhost
      PG_SHARD_3_HOST: localhost

      PG_META_POOL_MAX: "2"
      PG_SHARD_POOL_MAX: "3"

      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""

      APP_API_ROLE: all
      APP_PORT: "7001"
      APP_WORKERS: "1"

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js setup ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Create shard databases ─────────────────────────────────────────────
      # POSTGRES_DB 只建立 small_bank_meta，shard DB 要另外建立
      - name: Create shard databases
        env:
          PGPASSWORD: ci_pass
        run: |
          psql -h localhost -p 5432 -U ci_user -d postgres \
            -c "CREATE DATABASE small_bank_s0;"
          psql -h localhost -p 5432 -U ci_user -d postgres \
            -c "CREATE DATABASE small_bank_s1;"
          psql -h localhost -p 5432 -U ci_user -d postgres \
            -c "CREATE DATABASE small_bank_s2;"
          psql -h localhost -p 5432 -U ci_user -d postgres \
            -c "CREATE DATABASE small_bank_s3;"

      # ── Apply DB schemas ──────────────────────────────────────────────────
      - name: Apply meta schema
        env:
          PGPASSWORD: ci_pass
        run: |
          psql -h localhost -p 5432 -U ci_user -d small_bank_meta \
            -f docker/initdb-meta/01-schema_meta.sql

      - name: Apply shard schemas
        env:
          PGPASSWORD: ci_pass
        run: |
          psql -h localhost -p 5432 -U ci_user -d small_bank_s0 \
            -f docker/initdb-shard/01-schema_shard.sql
          psql -h localhost -p 5432 -U ci_user -d small_bank_s1 \
            -f docker/initdb-shard/01-schema_shard.sql
          psql -h localhost -p 5432 -U ci_user -d small_bank_s2 \
            -f docker/initdb-shard/01-schema_shard.sql
          psql -h localhost -p 5432 -U ci_user -d small_bank_s3 \
            -f docker/initdb-shard/01-schema_shard.sql

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: Lint
        run: npm run lint

      # ── Test ──────────────────────────────────────────────────────────────
      - name: Test
        run: npm run test:local
        timeout-minutes: 5

      # ── Upload test results (optional) ────────────────────────────────────
      - name: Upload test logs on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: logs/
          retention-days: 7
