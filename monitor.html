<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Small Bank — 即時監控</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #58a6ff;
      letter-spacing: 0.5px;
    }

    #status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
      margin-right: 8px;
      animation: pulse 1.5s infinite;
    }

    #status-dot.error { background: #f85149; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #last-update {
      font-size: 12px;
      color: #6e7681;
    }

    /* Summary cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
    }

    .card-label {
      font-size: 11px;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 28px;
      font-weight: 700;
      color: #e6edf3;
    }

    .card-value.warn { color: #d29922; }
    .card-value.danger { color: #f85149; }
    .card-value.ok { color: #3fb950; }

    .card-sub {
      font-size: 11px;
      color: #6e7681;
      margin-top: 4px;
    }

    .card-sub.up { color: #f85149; }
    .card-sub.down { color: #3fb950; }
    .card-sub.stable { color: #6e7681; }

    /* Hot accounts table */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }

    thead {
      background: #21262d;
    }

    th {
      font-size: 11px;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 10px 16px;
      text-align: left;
      font-weight: 500;
    }

    td {
      padding: 10px 16px;
      font-size: 13px;
      border-top: 1px solid #21262d;
    }

    tr:hover td { background: #1c2128; }

    .bar-cell { width: 240px; }

    .bar-wrap {
      background: #21262d;
      border-radius: 4px;
      height: 8px;
      width: 100%;
      overflow: hidden;
    }

    .bar-fill {
      height: 8px;
      border-radius: 4px;
      transition: width 0.3s ease;
      background: #3fb950;
    }

    .bar-fill.warn  { background: #d29922; }
    .bar-fill.danger { background: #f85149; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge.hot    { background: #3d1f1f; color: #f85149; }
    .badge.warm   { background: #2d2208; color: #d29922; }
    .badge.normal { background: #1a2a1a; color: #3fb950; }

    #empty-state {
      text-align: center;
      padding: 40px;
      color: #6e7681;
      font-size: 13px;
    }

    .throughput-arrow { font-size: 16px; }
  </style>
</head>
<body>

<header>
  <h1><span id="status-dot"></span>Small Bank — 即時監控</h1>
  <span id="last-update">等待資料...</span>
</header>

<div class="cards">
  <div class="card">
    <div class="card-label">Queue 中的任務</div>
    <div class="card-value" id="total-jobs">—</div>
    <div class="card-sub" id="jobs-delta">—</div>
  </div>
  <div class="card">
    <div class="card-label">活躍帳戶佇列數</div>
    <div class="card-value" id="total-queues">—</div>
    <div class="card-sub">個帳戶有待處理任務</div>
  </div>
  <div class="card">
    <div class="card-label">Hot Account 數量</div>
    <div class="card-value" id="hot-count">—</div>
    <div class="card-sub">Queue 深度 ≥ 10</div>
  </div>
  <div class="card">
    <div class="card-label">Worker 數量</div>
    <div class="card-value ok" id="workers">—</div>
    <div class="card-sub">queue worker 節點</div>
  </div>
</div>

<div class="section-title">🔥 Hot Account 排行（依 Queue 深度）</div>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>From Account ID</th>
      <th>Queue 深度</th>
      <th class="bar-cell">佔用率</th>
      <th>狀態</th>
    </tr>
  </thead>
  <tbody id="accounts-tbody">
    <tr><td colspan="5"><div id="empty-state">等待資料...</div></td></tr>
  </tbody>
</table>

<script>
  const GENERAL_API = 'http://localhost:7001';
  const POLL_INTERVAL_MS = 1000;
  const MAX_QUEUE = 300; // maxQueueLengthPerFromId
  const HOT_THRESHOLD = 10;

  let prevTotalJobs = null;

  async function fetchStats() {
    const res = await fetch(`${GENERAL_API}/queue/global-stats`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    return json.data;
  }

  function formatDelta(current, prev) {
    if (prev === null) return { text: '首次載入', cls: 'stable' };
    const delta = current - prev;
    if (delta > 0)  return { text: `▲ +${delta} / 秒（積壓中）`, cls: 'up' };
    if (delta < 0)  return { text: `▼ ${delta} / 秒（消化中）`, cls: 'down' };
    return { text: '— 穩定', cls: 'stable' };
  }

  function barClass(depth) {
    const pct = depth / MAX_QUEUE;
    if (pct >= 0.8) return 'danger';
    if (pct >= 0.4) return 'warn';
    return '';
  }

  function badge(depth) {
    if (depth >= 100) return '<span class="badge hot">🔥 HOT</span>';
    if (depth >= 10)  return '<span class="badge warm">⚠ WARM</span>';
    return '<span class="badge normal">✓ normal</span>';
  }

  function render(data) {
    const { totalJobs, totalQueues, hotAccounts, workers } = data;

    // Status dot
    document.getElementById('status-dot').className = '';

    // Cards
    const jobsEl = document.getElementById('total-jobs');
    jobsEl.textContent = totalJobs.toLocaleString();
    jobsEl.className = 'card-value' + (totalJobs > 500 ? ' danger' : totalJobs > 100 ? ' warn' : ' ok');

    const delta = formatDelta(totalJobs, prevTotalJobs);
    const deltaEl = document.getElementById('jobs-delta');
    deltaEl.textContent = delta.text;
    deltaEl.className = 'card-sub ' + delta.cls;
    prevTotalJobs = totalJobs;

    document.getElementById('total-queues').textContent = totalQueues.toLocaleString();

    const hotCount = hotAccounts.filter(a => a.queueLength >= HOT_THRESHOLD).length;
    const hotEl = document.getElementById('hot-count');
    hotEl.textContent = hotCount;
    hotEl.className = 'card-value' + (hotCount > 5 ? ' danger' : hotCount > 0 ? ' warn' : ' ok');

    document.getElementById('workers').textContent = workers;

    // Table
    const tbody = document.getElementById('accounts-tbody');

    if (hotAccounts.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5"><div id="empty-state">目前沒有積壓中的帳戶佇列 🎉</div></td></tr>';
      return;
    }

    const top = hotAccounts.slice(0, 15);
    const maxDepth = top[0].queueLength || 1;

    tbody.innerHTML = top.map((acc, i) => {
      const pct = Math.min((acc.queueLength / MAX_QUEUE) * 100, 100).toFixed(1);
      const cls = barClass(acc.queueLength);
      return `
        <tr>
          <td style="color:#6e7681">${i + 1}</td>
          <td><strong>#${acc.fromId}</strong></td>
          <td style="font-variant-numeric: tabular-nums">${acc.queueLength.toLocaleString()}</td>
          <td class="bar-cell">
            <div class="bar-wrap">
              <div class="bar-fill ${cls}" style="width:${pct}%"></div>
            </div>
            <div style="font-size:10px;color:#6e7681;margin-top:3px">${pct}%</div>
          </td>
          <td>${badge(acc.queueLength)}</td>
        </tr>
      `;
    }).join('');
  }

  async function poll() {
    try {
      const data = await fetchStats();
      render(data);
      document.getElementById('last-update').textContent =
        '最後更新：' + new Date().toLocaleTimeString('zh-TW');
    } catch (err) {
      document.getElementById('status-dot').className = 'error';
      document.getElementById('last-update').textContent = '連線失敗：' + err.message;
    }
  }

  poll();
  setInterval(poll, POLL_INTERVAL_MS);
</script>
</body>
</html>
